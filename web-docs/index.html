<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Crawssembly Docs</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header>
      <h1>Crawssembly Docs</h1>
      <nav>
        <a href="https://crawssembly.ultimatecraw.xyz">Demo</a>
        <a href="https://github.com/Jonah-Crawford/Crawssembly">GitHub</a>
      </nav>
    </header>

    <main id="docs">Loading docs...</main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      fetch("README.md")
        .then(response => response.text())
        .then(markdown => {
          document.getElementById("docs").innerHTML = marked.parse(markdown);
        })
        .catch(error => {
          document.getElementById("docs").textContent = "Failed to load docs: " + error;
        });
    </script>
  </body>
</html>
